<!DOCTYPE html>
<html>
<head>
  <title>VTMS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">🚗 VTMS Dashboard</h1>
  <p class="subtitle">Vehicle Tracking Management System</p>

  <div class="form-box">
    <input type="text" id="vehicleName" placeholder="Vehicle Name">
    <input type="text" id="vehicleNumber" placeholder="Vehicle Number">
    <button onclick="addVehicle()">Add Vehicle</button>
  </div>

  <p id="emptyMsg">No vehicles added yet 🚫</p>

  <div id="vehicleList" class="vehicle-container"></div>

  <script src="script.js"></script>
</body>
</html>
